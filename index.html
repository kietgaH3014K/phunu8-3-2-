<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tặng em - 8/3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@700&family=Pacifico&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-decoration {
            position: absolute;
            font-size: 30px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }

        .bg-decoration:nth-child(1) { top: 10%; left: 10%; }
        .bg-decoration:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .bg-decoration:nth-child(3) { bottom: 15%; left: 20%; animation-delay: 0.5s; }
        .bg-decoration:nth-child(4) { bottom: 25%; right: 10%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .gift-container {
            position: relative;
            width: 260px;
            height: 220px;
            cursor: pointer;
            z-index: 10;
        }

        .gift-box {
            position: absolute;
            bottom: 0;
            width: 260px;
            height: 150px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.6s;
            z-index: 2;
        }

        .gift-box-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 100%;
            background: #ffd93d;
        }

        .gift-lid {
            position: absolute;
            bottom: 150px;
            left: 0;
            width: 260px;
            height: 50px;
            background: linear-gradient(135deg, #ff8787 0%, #ff6b6b 100%);
            border-radius: 15px 15px 0 0;
            transition: transform 0.6s 0.2s, opacity 0.3s;
            z-index: 3;
        }

        .gift-lid-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 100%;
            background: #ffd93d;
        }

        .gift-bow {
            position: absolute;
            bottom: 195px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 30px;
            z-index: 4;
            transition: transform 0.5s;
        }

        .gift-bow::before, .gift-bow::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ff4757;
            border-radius: 50%;
            top: 0;
        }

        .gift-bow::before { left: -4px; transform: rotate(-30deg); }
        .gift-bow::after { right: -4px; transform: rotate(30deg); }

        .gift-bow-center {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: #ff3344;
            border-radius: 50%;
            z-index: 5;
        }

        .gift-text {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Pacifico', cursive;
            font-size: 1rem;
            z-index: 2;
        }

        .gift-container.open .gift-lid {
            transform: translateY(-90px) rotate(-15deg);
            opacity: 0.5;
        }

        .gift-container.open .gift-bow {
            transform: translateX(-50%) translateY(-100px) rotate(180deg);
        }

        .gift-container.open .gift-box {
            transform: translateY(10px);
        }

        .items-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            z-index: 1;
        }

        .item {
            position: absolute;
            font-size: 28px;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .item-1 { left: 10px; bottom: 10px; }
        .item-2 { left: 50%; bottom: 20px; transform: translateX(-50%); }
        .item-3 { right: 10px; bottom: 10px; }
        .item-4 { left: 0; bottom: 40px; }
        .item-5 { right: 0; bottom: 40px; }

        .gift-container.open .item { opacity: 1; }
        .gift-container.open .item-1 { transform: translateY(-70px); transition-delay: 0.1s; }
        .gift-container.open .item-2 { transform: translateX(-50%) translateY(-90px); transition-delay: 0.2s; }
        .gift-container.open .item-3 { transform: translateY(-70px); transition-delay: 0.3s; }
        .gift-container.open .item-4 { transform: translateY(-50px); transition-delay: 0.15s; }
        .gift-container.open .item-5 { transform: translateY(-50px); transition-delay: 0.25s; }

        .card {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 230px;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
            z-index: 15;
            opacity: 0;
            transition: all 0.6s 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .gift-container.open .card {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        .card-header h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff6b6b;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .card-message {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #333;
            text-align: center;
            line-height: 1.4;
        }

        .card-signature {
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: #ff6b6b;
            text-align: right;
            margin-top: 12px;
        }

        .hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            font-size: 0.9rem;
            color: #555;
            animation: pulse 2s infinite;
            z-index: 5;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        .balloon {
            position: absolute;
            width: 25px;
            height: 32px;
            border-radius: 50%;
            opacity: 0;
            z-index: 30;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: rgba(0,0,0,0.2);
        }

        @keyframes balloonFloat {
            0% { opacity: 0; transform: translateY(0); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-300px); }
        }

        .flying-heart {
            position: absolute;
            font-size: 16px;
            z-index: 30;
            opacity: 0;
        }

        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px); }
        }
    </style>
</head>
<body>

    <div class="bg-decoration">🌸</div>
    <div class="bg-decoration">🌺</div>
    <div class="bg-decoration">⭐</div>
    <div class="bg-decoration">💖</div>

    <div class="gift-container" onclick="openGift()">
        
        <div class="items-container">
            <div class="item item-1">🎀</div>
            <div class="item item-2">💌</div>
            <div class="item item-3">🎀</div>
            <div class="item item-4">🌸</div>
            <div class="item item-5">🌸</div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>💐 8/3</h2>
            </div>
            <div class="card-message">
                Chúc cốt ngày 8/3 thật vui vẻ!<br><br>
                Chúc cốt luôn xinh đẹp như hoa,<br>
                hạnh phúc như mật ngọt,<br>
                 ❤️
            </div>
            <div class="card-signature">
                Thân ái,<br>cốt 💕
            </div>
        </div>

        <div class="gift-lid">
            <div class="gift-lid-ribbon"></div>
        </div>

        <div class="gift-bow">
            <div class="gift-bow-center"></div>
        </div>

        <div class="gift-box">
            <div class="gift-box-ribbon"></div>
            <div class="gift-text">🎁 8/3 🎁</div>
        </div>
    </div>

    <div class="hint">👆 Bấm vào hộp quà để mở nào!</div>

    <script>
        let isOpen = false;

        function openGift() {
            const container = document.querySelector('.gift-container');
            
            if (!isOpen) {
                container.classList.add('open');
                isOpen = true;
                setTimeout(createBalloons, 500);
                setTimeout(createFlyingHearts, 700);
            }
        }

        function createBalloons() {
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff9ff3'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.style.left = Math.random() * 80 + 10 + '%';
                    balloon.style.top = '60%';
                    balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                    balloon.style.animation = `balloonFloat ${3 + Math.random() * 2}s ease-out forwards`;
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), 5000);
                }, i * 150);
            }
        }

        function createFlyingHearts() {
            const hearts = ['❤️', '💕', '💗', '💖', '💞'];
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'flying-heart';
                    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 70 + 15 + '%';
                    heart.style.top = '50%';
                    heart.style.animation = `flyUp ${2 + Math.random() * 2}s ease-out forwards`;
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 100);
            }
        }
    </script>

</body>
</html>
